{% extends "base.html" %}

{% block title %}Create a Prompt{% endblock %}

{% block content %}
    <h1>
        Create a Prompt for {{ game.name }}
    </h1>

    <div>
        <form method="post" action="{% url 'choose_game' %}">
            {% csrf_token %}
            {% for field in form.visible_fields %}
                {{ field.errors }}
                {{ field.help_text }}
                {{ field }}
            {% endfor %}
            <input type="submit" name="submit" value="Create Prompt" />
        </form>
    </div>
{% endblock %}
